<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* Design Premium e Minimalista */
        #banner-localidade {
            background-color: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            padding: 12px 20px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            color: #343a40;
            display: none; /* Inicia oculto para evitar 'pulo' de layout */
            animation: fadeIn 0.5s ease-in;
        }

        #banner-localidade strong {
            color: #0046be; /* Azul institucional/autoridade */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="banner-localidade">
        <span id="texto-local">📍 Verificando ofertas para sua região...</span>
    </div>

    <script>
        async function obterLocalidade() {
            const banner = document.getElementById('banner-localidade');
            const texto = document.getElementById('texto-local');

            try {
                // API estável e rápida
                const response = await fetch('https://ipapi.co/json/');
                
                if (!response.ok) throw new Error();

                const data = await response.json();

                if (data.city) {
                    banner.style.display = 'block';
                    texto.innerHTML = `Identificamos ofertas exclusivas com <strong>Frete Prioritário</strong> para <strong>${data.city}, ${data.region_code}</strong>`;
                }
            } catch (error) {
                // Fallback: se a API falhar, exibe uma mensagem genérica de autoridade
                banner.style.display = 'block';
                texto.innerHTML = `📍 Aproveite nossas ofertas exclusivas para sua região com <strong>Envio Imediato</strong>.`;
                console.error("Erro ao identificar localidade de forma silenciosa.");
            }
        }

        // Executa assim que o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', obterLocalidade);
    </script>

</body>
</html>
