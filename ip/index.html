<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        .shipping-alert {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f4f8;
            border: 1px solid #dce4ec;
            padding: 12px 20px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            color: #2c3e50;
            margin: 15px;
        }
        .shipping-alert strong { color: #0046be; font-weight: 600; }
        .pulse-icon {
            height: 8px; width: 8px; background: #28a745;
            border-radius: 50%; margin-right: 12px;
            box-shadow: 0 0 0 rgba(40, 167, 69, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }
    </style>
</head>
<body>

<div class="shipping-alert" id="geo-banner">
    <div class="pulse-icon"></div>
    <span id="geo-text">Verificando logística para sua região...</span>
</div>

<script>
    (function() {
        const textElement = document.getElementById('geo-text');
        let identificado = false;

        // Função de Fallback (Mensagem Genérica Profissional)
        function aplicarFallback() {
            if (!identificado) {
                identificado = true;
                textElement.innerHTML = `Estoque disponível para <strong>sua região</strong>. Envio prioritário liberado!`;
            }
        }

        // Timeout de Segurança: Se a API demorar mais de 1.5s, aplica o fallback
        const timeout = setTimeout(aplicarFallback, 1500);

        // API 3: Extreme IP Lookup (JSONP) - Geralmente ignorada por AdBlocks
        const script = document.createElement('script');
        script.src = 'https://extreme-ip-lookup.com/json/?callback=processarGeo';
        
        window.processarGeo = function(data) {
            clearTimeout(timeout);
            if (!identificado && data && data.city) {
                identificado = true;
                textElement.innerHTML = `Identificamos estoque disponível para <strong>${data.city}, ${data.region}</strong>.`;
            } else {
                aplicarFallback();
            }
        };

        script.onerror = aplicarFallback;
        document.head.appendChild(script);
    })();
</script>

</body>
</html>
