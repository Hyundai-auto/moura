<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        .entrega-status {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
            border: 1px solid #d1d9e0;
            padding: 12px 18px;
            border-radius: 6px;
            display: inline-block;
            color: #24292e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin: 10px;
        }
        .entrega-status strong { color: #0046be; }
        .dot { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="entrega-status" id="caixa-localidade">
        <span class="dot"></span> 
        <span id="texto-local">Verificando estoque regional...</span>
    </div>

    <script>
        // Função de Callback que será chamada pela API (Técnica JSONP)
        // Isso evita erros de CORS e 403 Forbidden
        function capturarLocalidade(data) {
            const display = document.getElementById('texto-local');
            
            if (data && data.city) {
                // Sucesso: Exibe cidade e estado
                display.innerHTML = `Estoque disponível para <strong>${data.city}, ${data.regionName}</strong>. Envio prioritário hoje!`;
            } else {
                // Caso a API retorne algo vazio
                exibirMensagemPadrao();
            }
        }

        function exibirMensagemPadrao() {
            document.getElementById('texto-local').innerHTML = `Estoque liberado para <strong>sua região</strong> com frete reduzido.`;
        }

        // Criamos o script de forma dinâmica para forçar o carregamento
        // Usamos o ip-api.com via JSONP (callback=...)
        const script = document.createElement('script');
        script.src = 'https://demo.ip-api.com/json/?callback=capturarLocalidade&lang=pt-BR';
        
        // Se o script falhar (DNS bloqueado), caímos no erro silencioso
        script.onerror = function() {
            exibirMensagemPadrao();
        };

        document.body.appendChild(script);
    </script>

</body>
</html>
