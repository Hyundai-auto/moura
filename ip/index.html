<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador por IP</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 { color: #1a73e8; margin-top: 0; }
        p { color: #5f6368; line-height: 1.6; }
        .data { font-weight: bold; color: #202124; }
        #loading { font-style: italic; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sua Localização</h2>
    <div id="loading">Consultando endereço IP...</div>
    
    <div id="result" class="hidden">
        <p><strong>IP:</strong> <span id="ip" class="data"></span></p>
        <p><strong>Cidade:</strong> <span id="city" class="data"></span></p>
        <p><strong>Estado/Região:</strong> <span id="region" class="data"></span></p>
        <p><strong>País:</strong> <span id="country" class="data"></span></p>
        <p><strong>Provedor:</strong> <span id="org" class="data"></span></p>
    </div>
</div>

<script>
    async function fetchLocation() {
        try {
            // Chamada para a API ipapi (retorna JSON por padrão)
            const response = await fetch('https://ipapi.co/json/');
            
            if (!response.ok) throw new Error('Falha na consulta');

            const data = await response.json();

            // Preenchendo os campos
            document.getElementById('ip').textContent = data.ip;
            document.getElementById('city').textContent = data.city;
            document.getElementById('region').textContent = data.region;
            document.getElementById('country').textContent = data.country_name;
            document.getElementById('org').textContent = data.org;

            // Interface
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');

        } catch (error) {
            document.getElementById('loading').textContent = 'Erro ao carregar dados. Verifique seu bloqueador de anúncios.';
            console.error('Erro:', error);
        }
    }

    // Inicia a busca ao carregar a página
    window.onload = fetchLocation;
</script>

</body>
</html>
